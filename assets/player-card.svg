<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="pcClip"><rect x="0" y="0" width="1000" height="260" rx="16" ry="16"/></clipPath>
    <radialGradient id="hexGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FDBA74"/>
    </linearGradient>
    <linearGradient id="barFillCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>

    <clipPath id="xpClip"><rect x="0" y="0" width="0" height="14"><animate attributeName="width" from="0" to="245" dur="1.4s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1" keyTimes="0;1" values="0;245"/></rect></clipPath>
    <clipPath id="strClip"><rect x="0" y="0" width="0" height="10"><animate attributeName="width" from="0" to="304" dur="1.1s" begin="0.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="intClip"><rect x="0" y="0" width="0" height="10"><animate attributeName="width" from="0" to="313" dur="1.1s" begin="0.45s" fill="freeze"/></rect></clipPath>
    <clipPath id="dexClip"><rect x="0" y="0" width="0" height="10"><animate attributeName="width" from="0" to="280" dur="1.1s" begin="0.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="lukClip"><rect x="0" y="0" width="0" height="10"><animate attributeName="width" from="0" to="257" dur="1.1s" begin="0.75s" fill="freeze"/></rect></clipPath>
  </defs>

  <g clip-path="url(#pcClip)">
    <rect x="0" y="0" width="1000" height="260" fill="#0B0B10"/>

    <!-- title bar -->
    <rect x="0" y="0" width="1000" height="36" fill="#14141c"/>
    <circle cx="24" cy="18" r="6" fill="#FF5F56"/>
    <circle cx="44" cy="18" r="6" fill="#FFBD2E"/>
    <circle cx="64" cy="18" r="6" fill="#27C93F"/>
    <text x="500" y="23" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#7d8598">ganesh@bitcoding — status.sh</text>
    <line x1="0" y1="36" x2="1000" y2="36" stroke="#F97316" stroke-opacity="0.25" stroke-width="1"/>

    <!-- left: rank badge -->
    <g transform="translate(150,150)">
      <circle r="90" fill="url(#hexGlow)">
        <animate attributeName="r" values="86;94;86" dur="3.4s" repeatCount="indefinite"/>
      </circle>
      <polygon points="0,-70 61,-35 61,35 0,70 -61,35 -61,-35" fill="#14141c" stroke="#F97316" stroke-width="2.5"/>
      <polygon points="0,-58 51,-29 51,29 0,58 -51,29 -51,-29" fill="none" stroke="#F97316" stroke-opacity="0.35" stroke-width="1"/>
      <text x="0" y="-6" text-anchor="middle" font-family="Fira Code, monospace" font-size="15" fill="#7d8598" letter-spacing="2">LEVEL</text>
      <text x="0" y="30" text-anchor="middle" font-family="Fira Code, monospace" font-weight="700" font-size="42" fill="#F97316">24</text>
    </g>
    <text x="150" y="235" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#22D3EE">BACKEND // AI-ADEPT</text>

    <!-- right: stats -->
    <g font-family="Fira Code, monospace">
      <text x="270" y="72" font-size="14" fill="#7d8598">CLASS  <tspan fill="#e5e7eb">Backend Engineer (Agentic AI subclass)</tspan></text>
      <text x="270" y="94" font-size="14" fill="#7d8598">GUILD  <tspan fill="#e5e7eb">BitCoding Solutions</tspan></text>

      <!-- XP bar -->
      <text x="270" y="122" font-size="13" fill="#7d8598">XP TO NEXT LEVEL</text>
      <text x="890" y="122" font-size="13" fill="#F97316" text-anchor="end">72%</text>
      <rect x="270" y="130" width="245" height="14" rx="7" fill="#1a1f2e"/>
      <g clip-path="url(#xpClip)"><rect x="270" y="130" width="245" height="14" rx="7" fill="url(#barFill)"/></g>

      <!-- STR -->
      <text x="270" y="164" font-size="12" fill="#7d8598">STR · backend systems</text>
      <text x="890" y="164" font-size="12" fill="#e5e7eb" text-anchor="end">92</text>
      <rect x="270" y="170" width="304" height="10" rx="5" fill="#1a1f2e"/>
      <g clip-path="url(#strClip)"><rect x="270" y="170" width="304" height="10" rx="5" fill="url(#barFillCyan)"/></g>

      <!-- INT -->
      <text x="270" y="192" font-size="12" fill="#7d8598">INT · problem solving</text>
      <text x="890" y="192" font-size="12" fill="#e5e7eb" text-anchor="end">95</text>
      <rect x="270" y="198" width="313" height="10" rx="5" fill="#1a1f2e"/>
      <g clip-path="url(#intClip)"><rect x="270" y="198" width="313" height="10" rx="5" fill="url(#barFillCyan)"/></g>

      <!-- DEX -->
      <text x="620" y="164" font-size="12" fill="#7d8598">DEX · shipping speed</text>
      <text x="890" y="164" font-size="12" fill="#e5e7eb" text-anchor="end"></text>
      <rect x="620" y="170" width="280" height="10" rx="5" fill="#1a1f2e"/>
      <g clip-path="url(#dexClip)"><rect x="620" y="170" width="280" height="10" rx="5" fill="url(#barFill)"/></g>
      <text x="910" y="180" font-size="12" fill="#e5e7eb">85</text>

      <!-- LUK -->
      <text x="620" y="192" font-size="12" fill="#7d8598">LUK · debugging</text>
      <rect x="620" y="198" width="257" height="10" rx="5" fill="#1a1f2e"/>
      <g clip-path="url(#lukClip)"><rect x="620" y="198" width="257" height="10" rx="5" fill="url(#barFill)"/></g>
      <text x="910" y="208" font-size="12" fill="#e5e7eb">78</text>

      <text x="270" y="238" font-size="12" fill="#5b6272">next unlock: senior backend engineer</text>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="999" height="259" rx="16" ry="16" fill="none" stroke="#F97316" stroke-opacity="0.35" stroke-width="1"/>
</svg>
