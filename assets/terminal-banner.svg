<svg width="1000" height="280" viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="termClip">
      <rect x="0" y="0" width="1000" height="280" rx="16" ry="16"/>
    </clipPath>
    <clipPath id="l1clip"><rect x="26" y="60" width="0" height="30"><animate id="a1" attributeName="width" from="0" to="640" dur="0.9s" begin="0s;a4.end+2.2s" fill="freeze" calcMode="linear"/></rect></clipPath>
    <clipPath id="l2clip"><rect x="26" y="98" width="0" height="30"><animate id="a2" attributeName="width" from="0" to="760" dur="1.1s" begin="a1.end+0.15s" fill="freeze" calcMode="linear"/></rect></clipPath>
    <clipPath id="l3clip"><rect x="26" y="136" width="0" height="30"><animate id="a3" attributeName="width" from="0" to="820" dur="1.3s" begin="a2.end+0.15s" fill="freeze" calcMode="linear"/></rect></clipPath>
    <clipPath id="l4clip"><rect x="26" y="174" width="0" height="30"><animate id="a4" attributeName="width" from="0" to="870" dur="1.3s" begin="a3.end+0.15s" fill="freeze" calcMode="linear"/></rect></clipPath>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#termClip)">
    <rect x="0" y="0" width="1000" height="280" fill="#0B0B10"/>
    <rect x="0" y="0" width="1000" height="280" fill="url(#glow)"/>

    <!-- binary rain background -->
    <g font-family="Fira Code, monospace" font-size="13" fill="#F97316" opacity="0.10">
      <text x="70" y="0">1 0 1 1 0<animateTransform attributeName="transform" type="translate" from="0 -40" to="0 280" dur="6.5s" begin="0s" repeatCount="indefinite"/></text>
      <text x="150" y="0">0 1 0 0 1<animateTransform attributeName="transform" type="translate" from="0 -40" to="0 280" dur="8s" begin="1.2s" repeatCount="indefinite"/></text>
      <text x="240" y="0">1 1 0 1 0<animateTransform attributeName="transform" type="translate" from="0 -40" to="0 280" dur="5.5s" begin="2.4s" repeatCount="indefinite"/></text>
      <text x="330" y="0">0 0 1 0 1<animateTransform attributeName="transform" type="translate" from="0 -40" to="0 280" dur="7.2s" begin="0.6s" repeatCount="indefinite"/></text>
      <text x="600" y="0">1 0 0 1 1<animateTransform attributeName="transform" type="translate" from="0 -40" to="0 280" dur="6.8s" begin="3s" repeatCount="indefinite"/></text>
      <text x="700" y="0">0 1 1 0 0<animateTransform attributeName="transform" type="translate" from="0 -40" to="0 280" dur="9s" begin="1.8s" repeatCount="indefinite"/></text>
      <text x="820" y="0">1 1 1 0 1<animateTransform attributeName="transform" type="translate" from="0 -40" to="0 280" dur="5.8s" begin="0.3s" repeatCount="indefinite"/></text>
      <text x="900" y="0">0 0 0 1 0<animateTransform attributeName="transform" type="translate" from="0 -40" to="0 280" dur="7.6s" begin="2.9s" repeatCount="indefinite"/></text>
    </g>

    <!-- title bar -->
    <rect x="0" y="0" width="1000" height="36" fill="#14141c"/>
    <circle cx="24" cy="18" r="6" fill="#FF5F56"/>
    <circle cx="44" cy="18" r="6" fill="#FFBD2E"/>
    <circle cx="64" cy="18" r="6" fill="#27C93F"/>
    <text x="500" y="23" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#7d8598">ganesh@bitcoding — zsh</text>
    <line x1="0" y1="36" x2="1000" y2="36" stroke="#F97316" stroke-opacity="0.25" stroke-width="1"/>

    <!-- typed lines -->
    <g font-family="Fira Code, monospace" font-size="21">
      <g clip-path="url(#l1clip)">
        <text x="26" y="82" fill="#F97316">$ <tspan fill="#e5e7eb">whoami</tspan></text>
      </g>
      <g clip-path="url(#l2clip)">
        <text x="26" y="120" fill="#22D3EE">&gt; <tspan fill="#e5e7eb">Ganesh Rajput — Backend Engineer</tspan></text>
      </g>
      <g clip-path="url(#l3clip)">
        <text x="26" y="158" fill="#22D3EE">&gt; <tspan fill="#e5e7eb">shipping production APIs @ BitCoding Solutions</tspan></text>
      </g>
      <g clip-path="url(#l4clip)">
        <text x="26" y="196" fill="#A855F7">&gt; <tspan fill="#e5e7eb">teaching agents to write &amp; run their own code</tspan></text>
      </g>
    </g>

    <!-- blinking cursor after last line -->
    <rect x="898" y="178" width="12" height="24" fill="#F97316" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.001;0.5;1" dur="0.9s" begin="a4.end" repeatCount="indefinite"/>
    </rect>

    <!-- bottom status strip -->
    <line x1="0" y1="244" x2="1000" y2="244" stroke="#1f2430" stroke-width="1"/>
    <text x="26" y="266" font-family="Fira Code, monospace" font-size="13" fill="#5b6272">strong systems survive scale · good engineering survives time</text>
    <text x="974" y="266" text-anchor="end" font-family="Fira Code, monospace" font-size="13" fill="#F97316">● online</text>
  </g>

  <rect x="0.5" y="0.5" width="999" height="279" rx="16" ry="16" fill="none" stroke="#F97316" stroke-opacity="0.35" stroke-width="1"/>
</svg>
