<svg width="1000" height="360" viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="skClip"><rect x="0" y="0" width="1000" height="360" rx="16" ry="16"/></clipPath>
    <linearGradient id="fillO" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316"/><stop offset="100%" stop-color="#FDBA74"/>
    </linearGradient>
    <linearGradient id="fillC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/><stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="fillP" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A855F7"/><stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
    <pattern id="stripes" width="14" height="14" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#A855F7" opacity="0.18"/>
      <rect width="7" height="14" fill="#A855F7" opacity="0.28"/>
      <animateTransform attributeName="patternTransform" type="translate" from="0 0" to="14 0" dur="1s" repeatCount="indefinite" additive="sum"/>
    </pattern>

    <!-- left column bars -->
    <clipPath id="b1"><rect width="0" height="10"><animate attributeName="width" to="336" dur="1s" begin="0.1s" fill="freeze"/></rect></clipPath>
    <clipPath id="b2"><rect width="0" height="10"><animate attributeName="width" to="322" dur="1s" begin="0.2s" fill="freeze"/></rect></clipPath>
    <clipPath id="b3"><rect width="0" height="10"><animate attributeName="width" to="308" dur="1s" begin="0.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="b4"><rect width="0" height="10"><animate attributeName="width" to="298" dur="1s" begin="0.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="b5"><rect width="0" height="10"><animate attributeName="width" to="273" dur="1s" begin="0.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="b6"><rect width="0" height="10"><animate attributeName="width" to="245" dur="1s" begin="0.6s" fill="freeze"/></rect></clipPath>

    <!-- right column bars -->
    <clipPath id="b7"><rect width="0" height="10"><animate attributeName="width" to="326" dur="1s" begin="0.15s" fill="freeze"/></rect></clipPath>
    <clipPath id="b8"><rect width="0" height="10"><animate attributeName="width" to="315" dur="1s" begin="0.25s" fill="freeze"/></rect></clipPath>
    <clipPath id="b9"><rect width="0" height="10"><animate attributeName="width" to="252" dur="1s" begin="0.35s" fill="freeze"/></rect></clipPath>
    <clipPath id="b10"><rect width="0" height="10"><animate attributeName="width" to="231" dur="1s" begin="0.45s" fill="freeze"/></rect></clipPath>
    <clipPath id="b11"><rect width="0" height="10"><animate attributeName="width" to="217" dur="1s" begin="0.55s" fill="freeze"/></rect></clipPath>
    <clipPath id="b12"><rect width="0" height="10"><animate attributeName="width" to="140" dur="1.3s" begin="0.7s" fill="freeze"/></rect></clipPath>
  </defs>

  <g clip-path="url(#skClip)">
    <rect width="1000" height="360" fill="#0B0B10"/>
    <rect width="1000" height="36" fill="#14141c"/>
    <circle cx="24" cy="18" r="6" fill="#FF5F56"/><circle cx="44" cy="18" r="6" fill="#FFBD2E"/><circle cx="64" cy="18" r="6" fill="#27C93F"/>
    <text x="500" y="23" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#7d8598">ganesh@bitcoding — skills.tree</text>
    <line x1="0" y1="36" x2="1000" y2="36" stroke="#F97316" stroke-opacity="0.25"/>

    <g font-family="Fira Code, monospace" font-size="13">
      <text x="30" y="62" fill="#5b6272" letter-spacing="2">CORE</text>
      <!-- left col rows y=76.. step 40 -->
      <g transform="translate(30,76)">
        <text y="0" fill="#e5e7eb">Python</text><text x="336" y="0" fill="#F97316" text-anchor="end">96</text>
        <rect y="8" width="336" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#b1)"><rect y="8" width="336" height="10" rx="5" fill="url(#fillO)"/></g>
      </g>
      <g transform="translate(30,116)">
        <text y="0" fill="#e5e7eb">FastAPI</text><text x="336" y="0" fill="#F97316" text-anchor="end">92</text>
        <rect y="8" width="336" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#b2)"><rect y="8" width="336" height="10" rx="5" fill="url(#fillO)"/></g>
      </g>
      <g transform="translate(30,156)">
        <text y="0" fill="#e5e7eb">Django REST</text><text x="336" y="0" fill="#F97316" text-anchor="end">88</text>
        <rect y="8" width="336" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#b3)"><rect y="8" width="336" height="10" rx="5" fill="url(#fillO)"/></g>
      </g>
      <g transform="translate(30,196)">
        <text y="0" fill="#e5e7eb">PostgreSQL</text><text x="336" y="0" fill="#F97316" text-anchor="end">85</text>
        <rect y="8" width="336" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#b4)"><rect y="8" width="336" height="10" rx="5" fill="url(#fillO)"/></g>
      </g>
      <g transform="translate(30,236)">
        <text y="0" fill="#e5e7eb">Docker</text><text x="336" y="0" fill="#F97316" text-anchor="end">78</text>
        <rect y="8" width="336" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#b5)"><rect y="8" width="336" height="10" rx="5" fill="url(#fillO)"/></g>
      </g>
      <g transform="translate(30,276)">
        <text y="0" fill="#e5e7eb">AWS</text><text x="336" y="0" fill="#F97316" text-anchor="end">70</text>
        <rect y="8" width="336" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#b6)"><rect y="8" width="336" height="10" rx="5" fill="url(#fillO)"/></g>
      </g>

      <text x="520" y="62" fill="#5b6272" letter-spacing="2">SECURITY // AGENTIC AI</text>
      <g transform="translate(520,76)">
        <text y="0" fill="#e5e7eb">Linux</text><text x="326" y="0" fill="#22D3EE" text-anchor="end">93</text>
        <rect y="8" width="326" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#b7)"><rect y="8" width="326" height="10" rx="5" fill="url(#fillC)"/></g>
      </g>
      <g transform="translate(520,116)">
        <text y="0" fill="#e5e7eb">Git / CI-CD</text><text x="326" y="0" fill="#22D3EE" text-anchor="end">90</text>
        <rect y="8" width="326" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#b8)"><rect y="8" width="326" height="10" rx="5" fill="url(#fillC)"/></g>
      </g>
      <g transform="translate(520,156)">
        <text y="0" fill="#e5e7eb">JWT / OAuth / RBAC</text><text x="326" y="0" fill="#22D3EE" text-anchor="end">72</text>
        <rect y="8" width="326" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#b9)"><rect y="8" width="326" height="10" rx="5" fill="url(#fillC)"/></g>
      </g>
      <g transform="translate(520,196)">
        <text y="0" fill="#e5e7eb">Burp Suite</text><text x="326" y="0" fill="#22D3EE" text-anchor="end">66</text>
        <rect y="8" width="326" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#b10)"><rect y="8" width="326" height="10" rx="5" fill="url(#fillC)"/></g>
      </g>
      <g transform="translate(520,236)">
        <text y="0" fill="#e5e7eb">Vector Search</text><text x="326" y="0" fill="#22D3EE" text-anchor="end">62</text>
        <rect y="8" width="326" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#b11)"><rect y="8" width="326" height="10" rx="5" fill="url(#fillC)"/></g>
      </g>
      <g transform="translate(520,276)">
        <text y="0" fill="#e5e7eb">DSPy / ReAct Agents</text><text x="326" y="0" fill="#A855F7" text-anchor="end">🔓 40</text>
        <rect y="8" width="326" height="10" rx="5" fill="#1a1f2e"/>
        <g clip-path="url(#b12)"><rect y="8" width="326" height="10" rx="5" fill="url(#fillP)"/><rect y="8" width="326" height="10" rx="5" fill="url(#stripes)"/></g>
      </g>
    </g>

    <text x="30" y="336" font-family="Fira Code, monospace" font-size="12" fill="#5b6272">🔓 = actively unlocking · skill tree updates as shipped</text>
  </g>
  <rect x="0.5" y="0.5" width="999" height="359" rx="16" ry="16" fill="none" stroke="#F97316" stroke-opacity="0.35" stroke-width="1"/>
</svg>
