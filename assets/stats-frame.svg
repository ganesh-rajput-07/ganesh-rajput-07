    <rect width="1000" height="36" fill="#14141c"/>
    <circle cx="24" cy="18" r="6" fill="#FF5F56"/><circle cx="44" cy="18" r="6" fill="#FFBD2E"/><circle cx="64" cy="18" r="6" fill="#27C93F"/>
    <text x="500" y="23" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#7d8598">ganesh@bitcoding — stats.live</text>
    <line x1="0" y1="36" x2="1000" y2="36" stroke="#F97316" stroke-opacity="0.25"/>
    <text x="30" y="56" font-family="Fira Code, monospace" font-size="13" fill="#5b6272">$ curl stats.ganesh --live</text>

