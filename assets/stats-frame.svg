<svg width="1000" height="520" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="stClip"><rect width="1000" height="520" rx="16" ry="16"/></clipPath>
  </defs>

  <g clip-path="url(#stClip)">
