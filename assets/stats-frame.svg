<svg
    width="1000"
    height="520"
    viewBox="0 0 1000 520"
    xmlns="http://www.w3.org/2000/svg">

    <defs>
        <clipPath id="clip">
            <rect x="0" y="0" width="1000" height="520" rx="16"/>
        </clipPath>
    </defs>

    <g clip-path="url(#clip)">

        <!-- Background -->
        <rect width="1000" height="520" fill="#0B0B10"/>

        <!-- Title Bar -->
        <rect width="1000" height="36" fill="#14141C"/>

        <circle cx="24" cy="18" r="6" fill="#FF5F56"/>
        <circle cx="44" cy="18" r="6" fill="#FFBD2E"/>
        <circle cx="64" cy="18" r="6" fill="#27C93F"/>

        <text
            x="500"
            y="23"
            text-anchor="middle"
            font-family="Fira Code, monospace"
            font-size="13"
            fill="#7D8598">
            ganesh@bitcoding — stats.live
        </text>

        <line
            x1="0"
            y1="36"
            x2="1000"
            y2="36"
            stroke="#F97316"
            stroke-opacity=".25"/>

        <text
            x="28"
            y="56"
            font-family="Fira Code, monospace"
            font-size="13"
            fill="#5B6272">
            $ curl stats.ganesh --live
        </text>

        <!-- Card Backgrounds -->

        <rect x="20" y="66" width="470" height="195" rx="10"
              fill="#12121A" stroke="#1F2430"/>

        <rect x="510" y="66" width="470" height="195" rx="10"
              fill="#12121A" stroke="#1F2430"/>

        <rect x="20" y="281" width="470" height="195" rx="10"
              fill="#12121A" stroke="#1F2430"/>

        <rect x="510" y="281" width="470" height="195" rx="10"
              fill="#12121A" stroke="#1F2430"/>

        <!-- Stats -->

        <image
            x="20"
            y="66"
            width="470"
            height="195"
            preserveAspectRatio="xMidYMid meet"
            href="https://github-readme-stats.vercel.app/api?username=ganesh-rajput-07&show_icons=true&theme=tokyonight&hide_border=true&bg_color=00000000&title_color=F97316&icon_color=F97316&text_color=E5E7EB&cache_seconds=60"/>

        <!-- Streak -->

        <image
            x="510"
            y="66"
            width="470"
            height="195"
            preserveAspectRatio="xMidYMid meet"
            href="https://github-readme-streak-stats.herokuapp.com?user=ganesh-rajput-07&theme=tokyonight&hide_border=true&background=00000000&ring=F97316&fire=F97316&currStreakLabel=F97316"/>

        <!-- Languages -->

        <image
            x="20"
            y="281"
            width="470"
            height="195"
            preserveAspectRatio="xMidYMid meet"
            href="https://github-readme-stats.vercel.app/api/top-langs/?username=ganesh-rajput-07&layout=compact&theme=tokyonight&hide_border=true&bg_color=00000000&title_color=F97316&text_color=E5E7EB&cache_seconds=60"/>

        <!-- Trophy -->

        <image
            x="510"
            y="281"
            width="470"
            height="195"
            preserveAspectRatio="xMidYMid meet"
            href="https://github-profile-trophy.vercel.app/?username=ganesh-rajput-07&theme=tokyonight&no-frame=true&no-bg=true&column=4&margin-w=8&margin-h=8"/>

        <!-- Footer -->

        <text
            x="28"
            y="505"
            font-family="Fira Code, monospace"
            font-size="11"
            fill="#5B6272">
            data refreshes automatically on push
        </text>

    </g>

    <!-- Border -->

    <rect
        x="0.5"
        y="0.5"
        width="999"
        height="519"
        rx="16"
        fill="none"
        stroke="#F97316"
        stroke-opacity=".35"/>

</svg>
