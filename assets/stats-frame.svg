<svg width="1000" height="330" viewBox="0 0 1000 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="s2Clip"><rect width="1000" height="330" rx="16" ry="16"/></clipPath>
    <linearGradient id="s2O" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316"/><stop offset="100%" stop-color="#FDBA74"/>
    </linearGradient>
    <clipPath id="langPy"><rect width="0" height="10"><animate attributeName="width" to="336" dur="1s" begin="0.1s" fill="freeze"/></rect></clipPath>
    <clipPath id="langFa"><rect width="0" height="10"><animate attributeName="width" to="322" dur="1s" begin="0.2s" fill="freeze"/></rect></clipPath>
    <clipPath id="langDj"><rect width="0" height="10"><animate attributeName="width" to="308" dur="1s" begin="0.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="langPg"><rect width="0" height="10"><animate attributeName="width" to="298" dur="1s" begin="0.4s" fill="freeze"/></rect></clipPath>
  </defs>

  <g clip-path="url(#s2Clip)">
    <rect width="1000" height="330" fill="#0B0B10"/>
    <rect width="1000" height="36" fill="#14141c"/>
    <circle cx="24" cy="18" r="6" fill="#FF5F56"/><circle cx="44" cy="18" r="6" fill="#FFBD2E"/><circle cx="64" cy="18" r="6" fill="#27C93F"/>
    <text x="500" y="23" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#7d8598">ganesh@bitcoding — stats.live</text>
    <line x1="0" y1="36" x2="1000" y2="36" stroke="#F97316" stroke-opacity="0.25"/>
    <text x="30" y="58" font-family="Fira Code, monospace" font-size="13" fill="#5b6272">$ curl stats.ganesh --live</text>

    <!-- left: overview    numbers -->
    <g font-family="Fira Code, monospace">
      <text x="30" y="92" font-size="12" fill="#5b6272" letter-spacing="2">OVERVIEW</text>

      <text x="30" y="130" font-size="30" font-weight="700" fill="#F97316">34</text>
      <text x="30" y="150" font-size="12" fill="#9098a8">public repos</text>

      <text x="180" y="130" font-size="30" font-weight="700" fill="#22D3EE">1,039</text>
      <text x="180" y="150" font-size="12" fill="#9098a8">total contributions</text>

      <g transform="translate(30,175)">
        <circle cx="20" cy="20" r="26" fill="none" stroke="#1a1f2e" stroke-width="5"/>
        <circle cx="20" cy="20" r="26" fill="none" stroke="#F97316" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="163" stroke-dashoffset="0" transform="rotate(-90 20 20)"/>
        <text x="20" y="25" text-anchor="middle" font-size="16" font-weight="700" fill="#F97316">17</text>
      </g>
      <text x="85" y="185" font-size="12" fill="#9098a8">current streak</text>
      <text x="88" y="200" font-size="11" fill="#5b6272">🔥 days in a row</text>

      <g transform="translate(210,175)">
        <circle cx="20" cy="20" r="26" fill="none" stroke="#1a1f2e" stroke-width="5"/>
        <circle cx="20" cy="20" r="26" fill="none" stroke="#22D3EE" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="163" stroke-dashoffset="0" transform="rotate(-90 20 20)"/>
        <text x="20" y="25" text-anchor="middle" font-size="16" font-weight="700" fill="#22D3EE">17</text>
      </g>
      <text x="265" y="185" font-size="12" fill="#9098a8">longest streak</text>
      <text x="268" y="200" font-size="11" fill="#5b6272">personal best</text>

      <text x="30" y="255" font-size="11" fill="#5b6272">since Aug 24, 2024</text>
      <text x="30" y="272" font-size="11" fill="#5b6272">source: github.com/ganesh-rajput-07</text>
    </g>

    <line x1="470" y1="66" x2="470" y2="300" stroke="#1f2430"/>

    <!-- right: primary stack -->
    <g font-family="Fira Code, monospace" font-size="13">
      <text x="510" y="92" font-size="12" fill="#5b6272" letter-spacing="2">PRIMARY STACK</text>

      <g transform="translate(510,110)">
        <text y="0" fill="#e5e7eb">Python</text><text x="336" y="0" fill="#F97316" text-anchor="end">96</text>
        <rect y="8" width="336" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#langPy)"><rect y="8" width="336" height="10" rx="5" fill="url(#s2O)"/></g>
      </g>
      <g transform="translate(510,150)">
        <text y="0" fill="#e5e7eb">FastAPI</text><text x="322" y="0" fill="#F97316" text-anchor="end">92</text>
        <rect y="8" width="322" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#langFa)"><rect y="8" width="322" height="10" rx="5" fill="url(#s2O)"/></g>
      </g>
      <g transform="translate(510,190)">
        <text y="0" fill="#e5e7eb">Django REST</text><text x="308" y="0" fill="#F97316" text-anchor="end">88</text>
        <rect y="8" width="308" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#langDj)"><rect y="8" width="308" height="10" rx="5" fill="url(#s2O)"/></g>
      </g>
      <g transform="translate(510,230)">
        <text y="0" fill="#e5e7eb">PostgreSQL</text><text x="298" y="0" fill="#F97316" text-anchor="end">85</text>
        <rect y="8" width="298" height="10" rx="5" fill="#1a1f2e"/><g clip-path="url(#langPg)"><rect y="8" width="298" height="10" rx="5" fill="url(#s2O)"/></g>
      </g>

      <text x="510" y="290" font-size="11" fill="#5b6272">full breakdown → skills.tree panel above</text>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="999" height="329" rx="16" ry="16" fill="none" stroke="#F97316" stroke-opacity="0.35" stroke-width="1"/>
</svg>
