      xlink:href="https://github-readme-streak-stats.herokuapp.com/?user=ganesh-rajput-07&amp;theme=tokyonight&amp;hide_border=true&amp;background=00000000&amp;ring=F97316&amp;fire=F97316&amp;currStreakLabel=F97316"/>

    <!-- row 2: languages + trophies -->
