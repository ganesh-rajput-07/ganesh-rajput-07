name: Daily Profile Update

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README
        run: |
          python3 << 'EOF'
          from datetime import datetime
          import re

          themes = [
              "Linux Security",
              "Networking",
              "Web Security",
              "Burp Suite",
              "OWASP Top 10",
              "Python Automation",
              "CTF Practice"
          ]

          day = datetime.utcnow().weekday()
          theme = themes[day]

          now = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          content = re.sub(
              r'<!-- THEME_START -->.*?<!-- THEME_END -->',
              f'<!-- THEME_START -->\n{theme}\n<!-- THEME_END -->',
              content,
              flags=re.S
          )

          content = re.sub(
              r'<!-- UPDATED_START -->.*?<!-- UPDATED_END -->',
              f'<!-- UPDATED_START -->\n{now}\n<!-- UPDATED_END -->',
              content,
              flags=re.S
          )

          badge_styles = [
              "flat",
              "flat-square",
              "for-the-badge",
              "plastic",
              "flat",
              "flat-square",
              "for-the-badge"
          ]
          
          style = badge_styles[day]
          
          badge_block = f"""
          <!-- BADGE_THEME_START -->
          ![Linux](https://img.shields.io/badge/Linux-Security-f59e0b?style={style}&logo=linux&logoColor=white)
          ![Networking](https://img.shields.io/badge/Networking-Learning-2563eb?style={style})
          ![Web Security](https://img.shields.io/badge/Web-Security-dc2626?style={style})
          ![Burp Suite](https://img.shields.io/badge/Burp-Suite-orange?style={style})
          <!-- BADGE_THEME_END -->
          """
          
          content = re.sub(
              r'<!-- BADGE_THEME_START -->.*?<!-- BADGE_THEME_END -->',
              badge_block.strip(),
              content,
              flags=re.S
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(content)
          EOF

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "docs: update cybersecurity theme"
          git push
